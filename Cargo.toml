[package]
name = "quine"
version = "0.1.0"
edition = "2024"

[workspace]
members = [
    "quine-core"
]

[workspace.dependencies]
rustc-hash = "2.1.2"
smallvec = "1.15.1"

[dependencies]
rustc-hash = { workspace = true }
smallvec = { workspace = true }
quine-core = { path="./quine-core" }

# rayon = "1.12.0"

pest = { version = "2.7" }
pest_derive = { version = "2.7" }

reedline = "0.47.0"
directories = "6.0.0"

[profile.release]
debug = true
lto = true
codegen-units = 1
panic = "abort"
split-debuginfo = "unpacked"
